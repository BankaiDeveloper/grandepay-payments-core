services:
  postgres:
    image: postgres:16-alpine
    container_name: grandepay-hypervel-benchmark-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-grandepay_payments_core}
      POSTGRES_USER: ${DB_USERNAME:-grandepay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grandepay}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-grandepay} -d ${DB_DATABASE:-grandepay_payments_core}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - benchmark-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: grandepay-hypervel-benchmark-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - benchmark-redis-data:/data

volumes:
  benchmark-postgres-data:
  benchmark-redis-data:
